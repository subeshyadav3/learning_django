{% extends "tasks/base.html" %}

{% block content %}
<style>
    .form-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh; 
    }

    .form-card {
        background: #ffffff;
        border: none;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        padding: 2.5rem;
        width: 100%;
        max-width: 500px;
    }

    .form-title {
        font-weight: 700;
        color: #2d3436;
        margin-bottom: 1.5rem;
        text-align: center;
    }

    .form-label {
        font-weight: 600;
        color: #636e72;
        margin-bottom: 0.5rem;
    }

    .form-control {
        border-radius: 8px;
        border: 1px solid #dfe6e9;
        padding: 0.75rem;
        transition: all 0.2s;
    }

    .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-submit {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        padding: 0.8rem;
        font-weight: 600;
        border-radius: 8px;
        margin-top: 1rem;
        transition: transform 0.2s;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
    }

    .btn-cancel {
        background-color: transparent;
        color: #b2bec3;
        border: none;
        text-decoration: none;
        display: block;
        text-align: center;
        margin-top: 1rem;
        font-size: 0.9rem;
    }

    .btn-cancel:hover {
        color: #636e72;
    }

   
    .form-check-input:checked {
        background-color: #667eea;
        border-color: #667eea;
    }
</style>

<div class="container form-wrapper">
    <div class="form-card">
        <h2 class="form-title">
            {% if form.instance.id %}Edit Task{% else %}Create New Task{% endif %}
        </h2>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Task Title</label>
                <input type="text" name="title" value="{{ form.title.value|default:'' }}" 
                       class="form-control" placeholder="What needs to be done?" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" 
                          placeholder="Add some details..." required>{{ form.description.value|default:'' }}</textarea>
            </div>

            <div class="form-check mb-4">
                <input type="checkbox" name="completed" class="form-check-input" id="completedCheck" 
                       {% if form.completed.value %}checked{% endif %}>
                <label class="form-check-label text-muted" for="completedCheck">
                    Mark as completed
                </label>
            </div>

            <button type="submit" class="btn btn-submit w-100">
                {% if form.instance.id %}Update Task{% else %}Save Task{% endif %}
            </button>
            
            <a href="{% url 'task_list' %}" class="btn-cancel">Cancel and go back</a>
        </form>
    </div>
</div>
{% endblock %}
